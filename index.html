<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>Meme Cam - 动作捕捉表情包</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
      background: #0d0d0d;
      color: #eee;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
      -webkit-user-select: none;
      touch-action: manipulation;
    }

    .container {
      display: flex;
      flex-direction: column;
      width: 100%;
      height: 100%;
      max-width: 500px;
      margin: 0 auto;
    }

    /* Top half: camera */
    .camera-section {
      flex: 1;
      position: relative;
      overflow: hidden;
      background: #1a1a1a;
      min-height: 0;
    }
    .camera-section video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transform: scaleX(-1);
    }
    .camera-section canvas {
      position: absolute;
      top: 0; left: 0;
      width: 100%;
      height: 100%;
      transform: scaleX(-1);
      pointer-events: none;
    }
    .camera-label {
      position: absolute;
      top: 12px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.55);
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
      padding: 4px 16px;
      border-radius: 20px;
      font-size: 13px;
      color: #fff;
      letter-spacing: 0.5px;
      z-index: 2;
    }

    /* Divider */
    .divider {
      height: 2px;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.15), transparent);
      flex-shrink: 0;
    }

    /* Bottom half: meme display */
    .meme-section {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #141414;
      position: relative;
      min-height: 0;
      padding: 16px;
    }
    .meme-wrapper {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      min-height: 0;
    }
    .meme-wrapper img {
      max-width: 100%;
      max-height: 100%;
      object-fit: contain;
      border-radius: 12px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.5);
    }
    .meme-info {
      text-align: center;
      margin-top: 8px;
      flex-shrink: 0;
    }
    .meme-info .meme-name {
      font-size: 18px;
      font-weight: 600;
      color: #fff;
    }
    .meme-info .meme-category {
      font-size: 12px;
      color: #888;
      margin-top: 2px;
    }

    /* Download button */
    .download-btn {
      position: absolute;
      bottom: 16px;
      right: 16px;
      width: 48px;
      height: 48px;
      border-radius: 50%;
      border: none;
      background: linear-gradient(135deg, #00ff88, #00cc6a);
      color: #000;
      font-size: 22px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 4px 16px rgba(0,255,136,0.3);
      transition: transform 0.2s, box-shadow 0.2s;
      z-index: 10;
    }
    .download-btn:active {
      transform: scale(0.92);
      box-shadow: 0 2px 8px rgba(0,255,136,0.2);
    }

    /* Loading overlay */
    .loading {
      position: fixed;
      inset: 0;
      background: #0d0d0d;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 100;
    }
    .loading .spinner {
      width: 40px;
      height: 40px;
      border: 3px solid #333;
      border-top-color: #00ff88;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    .loading .text {
      margin-top: 16px;
      font-size: 14px;
      color: #aaa;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Status bar */
    .status-bar {
      padding: 6px 16px;
      text-align: center;
      font-size: 11px;
      color: #888;
      background: #0a0a0a;
      flex-shrink: 0;
    }

    /* Responsive: landscape on mobile */
    @media (orientation: landscape) and (max-height: 500px) {
      .container { flex-direction: row; max-width: none; }
      .camera-section, .meme-section { flex: 1; height: 100%; }
      .divider { width: 2px; height: auto; }
    }

    /* Desktop */
    @media (min-width: 768px) {
      .container {
        border-left: 1px solid #222;
        border-right: 1px solid #222;
      }
    }
  </style>
</head>
<body>
  <div class="loading" id="loading">
    <div class="spinner"></div>
    <div class="text" id="loading-text">正在初始化...</div>
  </div>

  <div class="container">
    <!-- Camera section -->
    <div class="camera-section">
      <video id="camera-video" autoplay playsinline muted></video>
      <canvas id="overlay-canvas"></canvas>
      <div class="camera-label">📷 摄像头</div>
    </div>

    <!-- Divider -->
    <div class="divider"></div>

    <!-- Meme section -->
    <div class="meme-section">
      <div class="meme-wrapper">
        <img id="meme-image" src="/memes/default-waiting.svg" alt="等待动作..." />
      </div>
      <div class="meme-info">
        <div class="meme-name" id="meme-name">等待动作...</div>
        <div class="meme-category" id="meme-category">系统</div>
      </div>
      <button class="download-btn" id="download-btn" title="保存表情包">💾</button>
    </div>

    <!-- Status bar -->
    <div class="status-bar" id="status-text">正在初始化...</div>
  </div>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
